name: Generate SUMMARY.md

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: 0.4.36
      MDBOOK_SUMMARIZER_VERSION: 0.4.0
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook and mdbook-summarizer
        run: |
          curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf -y | sh
          rustup update
          cargo install --version ${MDBOOK_VERSION} mdbook
          cargo install --version ${MDBOOK_SUMMARIZER_VERSION} mdbook-summarizer
      - name: Generate SUMMARY.md with mdbook-summarizer
        run: |
          mdbook-summarizer --src src --auto-readme
          echo "SUMMARY.md generated"
      - name: Commit and push SUMMARY.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/SUMMARY.md
          git diff --cached --quiet || git commit -m "Auto-generate SUMMARY.md"
          git push
